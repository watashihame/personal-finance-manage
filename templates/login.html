<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 — 持仓追踪</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh">
<div class="container" style="max-width:360px">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h5 class="card-title mb-4 text-center">📊 持仓追踪</h5>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
          <div class="alert alert-{{ category }} py-2 small">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label small">访问 Token</label>
          <input type="password" name="token" class="form-control" autofocus required>
        </div>
        <button type="submit" class="btn btn-primary w-100">登录</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
